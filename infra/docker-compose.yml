services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kri}
      POSTGRES_DB: ${POSTGRES_DB:-kri_dashboard}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kri} -d ${POSTGRES_DB:-kri_dashboard}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../api
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build:
      context: ../web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  pg_data:
