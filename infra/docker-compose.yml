services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kri}
      POSTGRES_DB: ${POSTGRES_DB:-kri_dashboard}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    build:
      context: ../api
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "8000:8000"

  web:
    build:
      context: ../web
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pg_data:
